services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: dealerfinder-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: dealerfinder-db
    environment:
      POSTGRES_DB: dealerfinder
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: