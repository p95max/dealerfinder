{% if not request.session.cookie_consent %}
<div id="cookie-overlay" style="
    position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
"></div>

<div id="cookie-banner" style="
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 9999; width: calc(100% - 40px); max-width: 480px;
    background: var(--df-surface); border: 1px solid var(--df-border);
    border-radius: 20px; padding: 32px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.2);
    text-align: center;
">
    <div style="font-size: 32px; margin-bottom: 12px;">🍪</div>
    <h5 style="font-weight: 700; margin-bottom: 8px;">We use cookies</h5>
    <p class="small text-secondary mb-4">
        We use essential cookies for sessions and authentication. No tracking, no ads.
        See our <a href="{% url 'datenschutz' %}" target="_blank" rel="noopener">Privacy Policy</a>.
    </p>
    <button onclick="acceptCookies()" class="btn btn-primary rounded-pill px-5">
        Got it
    </button>
</div>

<script>
function acceptCookies() {
    fetch("{% url 'users:cookie_consent' %}", {
        method: "POST",
        headers: {"X-CSRFToken": "{{ csrf_token }}"},
    }).then(() => {
        document.getElementById("cookie-banner").remove();
        document.getElementById("cookie-overlay").remove();
    });
}
</script>
{% endif %}
