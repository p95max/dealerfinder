{% if not request.session.cookie_consent %}
<div id="cookie-overlay" class="cookie-overlay"></div>

<div id="cookie-banner"
     class="cookie-banner"
     role="dialog"
     aria-modal="true"
     aria-labelledby="cookieBannerTitle">
    <div class="cookie-banner__icon">🍪</div>

    <h5 id="cookieBannerTitle" class="cookie-banner__title">
        Privacy settings
    </h5>

    <p class="cookie-banner__text">
        We use essential cookies for sessions and security. We also use third-party services such as
        Google and Cloudflare to provide features like sign-in, maps, and bot protection.
        See our
        <a href="{% url 'datenschutz' %}" target="_blank" rel="noopener">Privacy Policy</a>.
    </p>

    <div class="cookie-banner__actions">
        <button type="button"
                id="cookie-accept-btn"
                class="btn btn-primary rounded-pill px-4">
            Accept
        </button>

        <button type="button"
                id="cookie-reject-btn"
                class="btn btn-outline-secondary rounded-pill px-4">
            Reject optional services
        </button>
    </div>
</div>
{% endif %}
