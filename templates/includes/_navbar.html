<div id="mainNav" class="collapse navbar-collapse">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'search' %}active fw-semibold{% endif %}"
               href="{% url 'dealers:search' %}">Search dealers</a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active fw-semibold{% endif %}"
               href="{% url 'dealers:about' %}">About</a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active fw-semibold{% endif %}"
               href="{% url 'dealers:contact' %}">Contact</a>
        </li>
        <li class="nav-item">
            <a class="nav-link text-secondary" style="opacity: .4; cursor: default; pointer-events: none;">
                👑 Premium (soon)
            </a>
        </li>
    </ul>

    <div class="d-flex align-items-center gap-2">
        {% if user.is_authenticated %}

            <div class="dropdown">
                <button class="btn p-0 border-0 bg-transparent"
                        data-bs-toggle="dropdown" aria-expanded="false"
                        style="display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 6px !important; border: 0.5px solid var(--df-border) !important; border-radius: 999px; background: var(--df-surface-muted) !important; transition: opacity .15s ease;"
                        onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
                    <div style="width: 28px; height: 28px; border-radius: 50%; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #1d4ed8;">
                        {{ user.email|slice:":2"|upper }}
                    </div>
                    <span style="font-size: 13px; font-weight: 500; color: var(--df-text);">{{ user.email }}</span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end mt-2" style="border-radius: 14px; border: 0.5px solid var(--df-border); min-width: 210px;">
                    <li>
                        <div class="px-3 py-2 border-bottom">
                            <div class="small text-secondary mb-1">Searches today</div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-grow-1" style="height: 4px; border-radius: 999px;">
                                    <div class="progress-bar bg-primary" style="width: {% widthratio user.used_today user.daily_quota 100 %}%;"></div>
                                </div>
                                <span id="quota-counter">{{ user.used_today }} / {{ user.daily_quota }}</span>
                            </div>
                        </div>
                    </li>
                    <li>
                        <a class="dropdown-item py-2" href="{% url 'users:profile' %}">Profile</a>
                    </li>
                    <li>
                        <form method="post" action="{% url 'account_logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item py-2 text-danger">Sign out</button>
                        </form>
                    </li>
                </ul>
            </div>

        {% else %}
            <a class="btn btn-primary rounded-pill px-4 btn-sm"
               href="{% url 'account_login' %}">
                Sign in with Google
            </a>
        {% endif %}

        <button class="btn btn-sm btn-outline-secondary" id="theme-toggle" style="width: 34px; height: 34px; padding: 0;">🌙</button>
    </div>
</div>
