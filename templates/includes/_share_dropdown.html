<div class="dropdown flex-grow-1">

               target="_blank"
               rel="noopener noreferrer">

                     fill="currentColor" viewBox="0 0 16 16">
                    <path d="M16 1.03 0 7.09l4.9 1.8 1.8 4.9L16 1.03zM6.6 10.6l-.3 2.6c.4 0 .6-.2.9-.4l2.2-2.1 4.5 3.3c.8.5 1.4.2 1.6-.7L16 1.03l-9.4 9.6z"/>

               id="shareEmailBtn">

                     fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v.2L8 8 0 4.2V4z"/>
                    <path d="M0 5.4v6.6A2 2 0 0 0 2 14h12a2 2 0 0 0 2-2V5.4l-8 3.8-8-3.8z"/>
