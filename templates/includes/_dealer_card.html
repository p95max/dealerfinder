<div class="card border-0 shadow-sm" style="border-radius: 16px;">
    <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h5 class="fw-bold mb-1">{{ dealer.name }}</h5>
                <p class="text-secondary small mb-1">{{ dealer.address }}</p>
                {% if dealer.rating %}
                <span class="badge bg-warning text-dark">★ {{ dealer.rating }}</span>
                {% endif %}
                {% if dealer.phone %}
                <a href="tel:{{ dealer.phone }}" class="small ms-2">{{ dealer.phone }}</a>
                {% endif %}
                {% if dealer.website %}
                <a href="{{ dealer.website }}" target="_blank" class="small ms-2">Website</a>
                {% endif %}
            </div>
            {% if user.is_authenticated %}
            {% if is_favorite %}
            <button class="btn btn-sm btn-outline-danger rounded-pill"
                    onclick="removeFavorite('{{ dealer.place_id }}')">★ Remove</button>
            {% else %}
            <button class="btn btn-sm btn-outline-secondary rounded-pill"
                    onclick="addFavorite(this, '{{ dealer.place_id }}', '{{ dealer.name|escapejs }}', '{{ dealer.address|escapejs }}', '{{ dealer.rating }}', '{{ dealer.phone|escapejs }}', '{{ dealer.website|escapejs }}')">☆ Save</button>
            {% endif %}
            {% endif %}
        </div>
    </div>
</div>
