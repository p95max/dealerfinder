<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DealerFinder{% endblock %}</title>

    <meta name="description" content="Find reliable car dealers with smart filtering and cache-first search.">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >

    <style>
        :root {
            --df-bg: #0f172a;
            --df-bg-soft: #111827;
            --df-surface: #ffffff;
            --df-surface-muted: #f8fafc;
            --df-border: #e5e7eb;
            --df-text: #0f172a;
            --df-text-muted: #64748b;
            --df-primary: #2563eb;
            --df-primary-dark: #1d4ed8;
            --df-success: #16a34a;
            --df-warning: #f59e0b;
            --df-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --df-radius: 20px;
        }

        html, body {
            min-height: 100%;
            background: #f8fafc;
            color: var(--df-text);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .hero {
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(22, 163, 74, 0.10), transparent 25%),
                linear-gradient(135deg, #0f172a 0%, #111827 100%);
            color: #fff;
            border-radius: 0 0 28px 28px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 0.9rem;
        }

        .hero-title {
            font-size: clamp(2rem, 4vw, 3.5rem);
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .hero-text {
            color: rgba(255, 255, 255, 0.82);
            max-width: 720px;
            font-size: 1.05rem;
        }

        .surface-card {
            background: var(--df-surface);
            border: 1px solid var(--df-border);
            border-radius: var(--df-radius);
            box-shadow: var(--df-shadow);
        }

        .surface-card-muted {
            background: var(--df-surface-muted);
            border: 1px solid var(--df-border);
            border-radius: var(--df-radius);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .section-subtitle {
            color: var(--df-text-muted);
        }

        .search-panel {
            margin-top: -56px;
            position: relative;
            z-index: 5;
        }

        .dealer-card {
            border: 1px solid var(--df-border);
            border-radius: 18px;
            background: #fff;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
        }

        .dealer-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }

        .dealer-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .dealer-meta {
            color: var(--df-text-muted);
            font-size: 0.95rem;
        }

        .score-badge,
        .contact-badge,
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .score-badge {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .contact-badge {
            background: #f0fdf4;
            color: #15803d;
        }

        .status-badge {
            background: #fff7ed;
            color: #c2410c;
        }

        .feature-item {
            height: 100%;
        }

        .feature-icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eff6ff;
            color: #2563eb;
            font-weight: 700;
        }

        .footer-link {
            color: var(--df-text-muted);
            text-decoration: none;
        }

        .footer-link:hover {
            color: var(--df-primary);
        }

        .empty-state {
            border: 1px dashed #cbd5e1;
            border-radius: 18px;
            background: #fff;
        }

        .form-label {
            font-weight: 600;
        }

        .sticky-panel {
            position: sticky;
            top: 24px;
        }

        @media (max-width: 991.98px) {
            .search-panel {
                margin-top: -36px;
            }

            .sticky-panel {
                position: static;
            }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container py-2">
        <a class="navbar-brand" href="{% url 'home' %}">DealerFinder</a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNav" class="collapse navbar-collapse">
            <div class="ms-auto d-flex align-items-center gap-2">
                <a class="btn btn-link text-decoration-none text-dark" href="{% url 'search' %}">Search</a>
                <a class="btn btn-outline-dark rounded-pill px-3" href="#">Sign in</a>
            </div>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="border-top bg-white mt-5">
    <div class="container py-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <div class="fw-semibold">DealerFinder</div>
            <div class="text-secondary small">Cache-first dealer discovery for Germany.</div>
        </div>

        <div class="d-flex flex-wrap gap-3">
            <a class="footer-link" href="#">Impressum</a>
            <a class="footer-link" href="#">Datenschutz</a>
            <a class="footer-link" href="#">AGB</a>
        </div>
    </div>
</footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
{% block extra_js %}{% endblock %}
</body>
</html>
