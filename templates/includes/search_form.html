<form method="get" action="{% url 'dealers:search' %}" class="row g-3" id="dealerSearchForm">
    <div class="col-md-4">
        <label class="form-label" for="city">City</label>
        <input
            type="text"
            id="city"
            name="city"
            class="form-control"
            placeholder="Enter city..."
            value="{{ request.GET.city }}"
            maxlength="100"
            list="cities-list"
            autocomplete="off"
        >
        <datalist id="cities-list"></datalist>
    </div>

    <div class="col-md-2">
        <label class="form-label" for="radius">Radius (km)</label>
        <input
            type="number"
            id="radius"
            name="radius"
            class="form-control"
            value="{{ request.GET.radius|default:20 }}"
            min="1"
            max="300"
            step="1"
        >
    </div>

    <div class="col-md-2">
        <label class="form-label" for="min_rating">Min. rating</label>
        <input
            type="number"
            id="min_rating"
            name="min_rating"
            class="form-control"
            step="0.1"
            min="1"
            max="5"
            placeholder="e.g. 4.0"
            value="{{ request.GET.min_rating }}"
        >
    </div>

    <div class="col-md-2">
        <label class="form-label" for="max_distance_km">Distance from me (km)</label>
        <input
            type="number"
            id="max_distance_km"
            name="max_distance_km"
            class="form-control"
            min="1"
            max="300"
            step="1"
            placeholder="Optional"
            value="{{ request.GET.max_distance_km }}"
        >
    </div>

    <div class="col-md-2">
        <label class="form-label" for="sort">Sort by</label>
        <select name="sort" id="sort" class="form-select">
            <option value="score" {% if request.GET.sort == "score" or not request.GET.sort %}selected{% endif %}>
                Best match
            </option>
            <option value="rating" {% if request.GET.sort == "rating" %}selected{% endif %}>
                Rating
            </option>
            <option value="reviews" {% if request.GET.sort == "reviews" %}selected{% endif %}>
                Reviews
            </option>
            <option value="distance" {% if request.GET.sort == "distance" %}selected{% endif %}>
                Distance
            </option>
        </select>
    </div>

    <input type="hidden" name="user_lat" id="user_lat" value="{{ request.GET.user_lat }}">
    <input type="hidden" name="user_lng" id="user_lng" value="{{ request.GET.user_lng }}">

    <div class="col-12 d-flex flex-wrap gap-4">
        <div class="form-check">
            <input
                class="form-check-input"
                type="checkbox"
                name="open_now"
                id="open_now"
                value="1"
                {% if request.GET.open_now %}checked{% endif %}
            >
            <label class="form-check-label" for="open_now">Open now</label>
        </div>

        <div class="form-check">
            <input
                class="form-check-input"
                type="checkbox"
                name="weekends"
                id="weekends"
                value="1"
                {% if request.GET.weekends %}checked{% endif %}
            >
            <label class="form-check-label" for="weekends">Open on weekends</label>
        </div>

        <div class="form-check">
            <input
                class="form-check-input"
                type="checkbox"
                name="has_contacts"
                id="has_contacts"
                value="1"
                {% if request.GET.has_contacts %}checked{% endif %}
            >
            <label class="form-check-label" for="has_contacts">Has contacts</label>
        </div>

        <div class="form-check">
            <input
                class="form-check-input"
                type="checkbox"
                id="use_my_location"
                {% if request.GET.user_lat and request.GET.user_lng %}checked{% endif %}
            >
            <label class="form-check-label" for="use_my_location">Use my location</label>
        </div>
    </div>

    <div class="col-12">
        <div id="locationHelp" class="form-text">
            Location is optional. If enabled, we will use your coordinates only for distance-based filtering and sorting.
        </div>
    </div>

    {% include "includes/_accept_terms_anon.html" %}

    <div class="col-12 col-lg-3">
        <button type="submit" class="btn btn-primary w-100">Search</button>
    </div>

</form>
