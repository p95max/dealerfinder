<form method="get" action="{% url 'dealers:search' %}" class="row g-3">
    <div class="col-md-6">
        <label class="form-label">City</label>
        <input
            type="text"
            name="city"
            class="form-control"
            placeholder="Berlin"
            value="{{ request.GET.city }}"
        >
    </div>

    <div class="col-md-3">
        <label class="form-label">Radius (km)</label>
        <input
            type="number"
            name="radius"
            class="form-control"
            value="{{ request.GET.radius|default:20 }}"
        >
    </div>

    <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100">
            Search
        </button>
    </div>
</form>
