{% extends "base.html" %}

{% block title %}Continue with Google — DealerFinder{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 720px;">
    <div class="surface-card p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-3">Continue with Google</h1>
        <p class="text-secondary mb-4">
            You are about to sign in using your Google account.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-primary rounded-pill px-4">
                    Continue
                </button>
                <a href="{% url 'dealers:home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
