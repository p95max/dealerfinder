{% extends "base.html" %}

{% block title %}Sign out — DealerFinder{% endblock %}

{% block content %}
<section class="container py-5" style="max-width: 720px;">
    <div class="surface-card p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-3">Sign out</h1>
        <p class="text-secondary mb-4">
            Are you sure you want to sign out of DealerFinder?
        </p>

        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <div class="d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-danger rounded-pill px-4">
                    Sign out
                </button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
