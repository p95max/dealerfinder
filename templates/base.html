{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DealerFinder{% endblock %}</title>

    <meta name="description" content="Find reliable car dealers with smart filtering and cache-first search.">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'css/search_form.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container py-2">
        <a class="navbar-brand" href="{% url 'dealers:home' %}">DealerFinder</a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNav" class="collapse navbar-collapse">
            <div class="ms-auto d-flex align-items-center gap-2">
                <a class="btn btn-link text-decoration-none text-dark" href="{% url 'dealers:search' %}">Search</a>
                <a class="btn btn-outline-dark rounded-pill px-3" href="#">Sign in</a>
            </div>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="border-top bg-white mt-5">
    <div class="container py-4 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
        <div>
            <div class="fw-semibold">DealerFinder</div>
            <div class="text-secondary small">Cache-first dealer discovery for Germany.</div>
        </div>

        <div class="d-flex flex-wrap gap-3">
            <a class="footer-link" href="#">Impressum</a>
            <a class="footer-link" href="#">Datenschutz</a>
            <a class="footer-link" href="#">AGB</a>
        </div>
    </div>
</footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
{% block extra_js %}{% endblock %}
</body>
</html>
